<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JWT Auth System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container { width: 100%; max-width: 440px; padding: 20px; }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 { font-size: 26px; color: #38bdf8; font-weight: 700; }
    .logo p  { font-size: 13px; color: #64748b; margin-top: 4px; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #0f172a;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #38bdf8;
      color: #0f172a;
    }

    /* Forms */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #38bdf8; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-primary:hover { background: #0ea5e9; }
    .btn-danger  { background: #ef4444; color: white; }
    .btn-danger:hover  { background: #dc2626; }

    /* Alert */
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .alert.success { background: #052e16; border: 1px solid #16a34a; color: #4ade80; }
    .alert.error   { background: #2d0000; border: 1px solid #ef4444; color: #f87171; }
    .alert.show    { display: block; }

    /* Dashboard */
    #dashboard { display: none; }
    #dashboard.active { display: block; }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .dash-header h2 { font-size: 18px; color: #38bdf8; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      background: #1e40af;
      color: #93c5fd;
    }
    .badge.ADMIN  { background: #7c2d12; color: #fdba74; }
    .badge.MANAGER{ background: #3b0764; color: #d8b4fe; }
    .badge.MEMBER { background: #1e3a5f; color: #93c5fd; }

    .profile-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .profile-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }
    .profile-row:last-child { border-bottom: none; }
    .profile-row span:first-child { color: #64748b; }
    .profile-row span:last-child  { color: #e2e8f0; font-weight: 500; }

    .token-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .token-box label {
      font-size: 12px;
      color: #64748b;
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .token-value {
      font-family: monospace;
      font-size: 11px;
      color: #4ade80;
      word-break: break-all;
      line-height: 1.6;
      max-height: 70px;
      overflow-y: auto;
    }
    .token-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 12px;
      color: #4ade80;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:0.4; }
    }

    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>🔐 JWT Auth System</h1>
    <p>Spring Boot + Java 21 Backend</p>
  </div>

  <!-- AUTH CARD -->
  <div class="card" id="authCard">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn"        onclick="switchTab('register')">Register</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- LOGIN FORM -->
    <div id="loginSection" class="form-section active">
      <div class="form-group">
  <label>Username or Email</label>
  <input type="text" id="loginUsername" placeholder="Enter username or email" />
</div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />
      </div>
      <button class="btn btn-primary" onclick="login()">Login</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerSection" class="form-section">
      <div class="row-2">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="regFirstName" placeholder="First name" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="regLastName" placeholder="Last name" />
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="text" id="regPhone" placeholder="Phone number" />
      </div>
      <button class="btn btn-primary" onclick="register()">Create Account</button>
    </div>
  </div>

  <!-- DASHBOARD (shown after login) -->
  <div id="dashboard" class="card">
    <div class="dash-header">
      <div>
        <h2>Welcome back! 👋</h2>
        <p style="font-size:13px;color:#64748b;margin-top:4px;">You are authenticated</p>
      </div>
      <button class="btn btn-danger" style="width:auto;padding:8px 16px;margin-top:0" onclick="logout()">Logout</button>
    </div>

    <div id="alertDash" class="alert"></div>

    <!-- Token Display -->
    <div class="token-box">
      <label>JWT Token (stored in localStorage)</label>
      <div class="token-value" id="tokenDisplay">—</div>
      <div class="token-status">
        <div class="dot"></div>
        <span>Token active — sent automatically with every protected request</span>
      </div>
    </div>

    <!-- Profile Data -->
    <div class="profile-card" id="profileCard">
      <div style="font-size:13px;color:#64748b;text-align:center;padding:10px">
        Loading profile...
      </div>
    </div>

    <button class="btn btn-primary" onclick="fetchProfile()" style="background:#1e40af;color:#93c5fd">
      🔄 Refresh Profile (Protected API Call)
    </button>
  </div>
</div>

<script>
  const API = 'https://jwtauthentication-production-09c3.up.railway.app/'

  // ─── HELPERS ──────────────────────────────────────────────
  function showAlert(msg, type, dashMode = false) {
    const box = dashMode ? document.getElementById('alertDash') : document.getElementById('alertBox');
    box.textContent = msg;
    box.className = `alert ${type} show`;
    setTimeout(() => box.className = 'alert', 4000);
  }

  function getToken() {
    return localStorage.getItem('jwt_token');
  }

  function saveToken(data) {
    localStorage.setItem('jwt_token', data.token);
    localStorage.setItem('jwt_user', JSON.stringify({
      id: data.id,
      username: data.username,
      email: data.email,
      role: data.role
    }));
  }

  function clearToken() {
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('jwt_user');
  }

  // ─── TAB SWITCH ───────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('loginSection').classList.toggle('active', tab === 'login');
    document.getElementById('registerSection').classList.toggle('active', tab === 'register');
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('alertBox').className = 'alert';
  }

  // ─── LOGIN ────────────────────────────────────────────────
  async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!username || !password) {
      showAlert('Please enter username and password.', 'error'); return;
    }

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usernameOrEmail: username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.message || 'Invalid credentials.', 'error'); return;
      }

      saveToken(data);
      showDashboard(data);

    } catch (err) {
      showAlert('Cannot connect to server. Make sure Spring Boot is running on port 8081.', 'error');
    }
  }

  // ─── REGISTER ─────────────────────────────────────────────
  async function register() {
    const body = {
      firstName: document.getElementById('regFirstName').value.trim(),
      lastName:  document.getElementById('regLastName').value.trim(),
      username:  document.getElementById('regUsername').value.trim(),
      email:     document.getElementById('regEmail').value.trim(),
      password:  document.getElementById('regPassword').value.trim(),
      phone:     document.getElementById('regPhone').value.trim()
    };

    if (!body.username || !body.email || !body.password) {
      showAlert('Username, email and password are required.', 'error'); return;
    }

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.message || 'Registration failed.', 'error'); return;
      }

      saveToken(data);
      showDashboard(data);

    } catch (err) {
      showAlert('Cannot connect to server. Make sure Spring Boot is running on port 8081.', 'error');
    }
  }

  // ─── FETCH PROFILE (Protected Route) ──────────────────────
  async function fetchProfile() {
    const token = getToken();
    if (!token) return;

    try {
      const res = await fetch(`${API}/users/profile`, {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`   // Token handling in frontend
        }
      });

      if (res.status === 401) {
        showAlert('Token expired. Please login again.', 'error', true);
        logout(); return;
      }

      const data = await res.json();
      renderProfile(data);

    } catch (err) {
      showAlert('Failed to fetch profile.', 'error', true);
    }
  }

  // ─── RENDER PROFILE ───────────────────────────────────────
  function renderProfile(data) {
    const card = document.getElementById('profileCard');
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-size:14px;font-weight:600;color:#94a3b8">Profile Data — from protected API</span>
        <span class="badge ${data.role || ''}">${data.role || 'MEMBER'}</span>
      </div>
      <div class="profile-row"><span>ID</span><span>#${data.id}</span></div>
      <div class="profile-row"><span>Username</span><span>${data.username}</span></div>
      <div class="profile-row"><span>Email</span><span>${data.email}</span></div>
      <div class="profile-row"><span>First Name</span><span>${data.firstName || '—'}</span></div>
      <div class="profile-row"><span>Last Name</span><span>${data.lastName || '—'}</span></div>
      <div class="profile-row"><span>Phone</span><span>${data.phone || '—'}</span></div>
      <div class="profile-row"><span>Status</span><span style="color:#4ade80">${data.isActive ? '✅ Active' : '❌ Inactive'}</span></div>
    `;
  }

  // ─── SHOW DASHBOARD ───────────────────────────────────────
  function showDashboard(data) {
    document.getElementById('authCard').style.display = 'none';
    const dash = document.getElementById('dashboard');
    dash.style.display = 'block';

    // Show token
    document.getElementById('tokenDisplay').textContent = getToken();

    // Fetch profile using token
    fetchProfile();
  }

  // ─── LOGOUT ───────────────────────────────────────────────
  function logout() {
    clearToken();
    document.getElementById('authCard').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    switchTab('login');
  }

  // ─── AUTO LOGIN IF TOKEN EXISTS ───────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const token = getToken();
    if (token) {
      const user = JSON.parse(localStorage.getItem('jwt_user') || '{}');
      document.getElementById('tokenDisplay').textContent = token;
      document.getElementById('authCard').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      fetchProfile();
    }
  });
</script>
</body>
</html>
